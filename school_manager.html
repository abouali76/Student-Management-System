<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديميا برو v3.1 | الإصدار النهائي</title>
    <style>
        :root {
            --primary: #10b981;
            --secondary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
            --card: #ffffff;
            --border: #e2e8f0;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        .sidebar { width: 250px; background: #ffffff; height: 100vh; border-left: 1px solid var(--border); padding: 20px; position: fixed; }
        .main { margin-right: 250px; padding: 40px; width: 100%; }
        .nav-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-weight: bold; }
        .nav-item:hover { color: var(--primary); }
        .view { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .view.active { display: block; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
        h1 { color: var(--secondary); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🎓 أكاديميا برو</h2>
        <div class="nav-item" onclick="showView('dashboard')">📊 لوحة التحكم</div>
        <div class="nav-item" onclick="showView('students')">👥 إدارة الطلاب</div>
        <div class="nav-item" onclick="showView('settings')">⚙️ الإعدادات</div>
        <br>
        <button class="btn" onclick="window.location.href='index.html'">تسجيل الخروج</button>
    </div>

    <div class="main">
        <div id="view-dashboard" class="view active">
            <h1>لوحة التحكم</h1>
            <p>أهلاً بك في الإصدار السلس والمستقر.</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="background: #ecfdf5; padding: 20px; border-radius: 10px;">إجمالي الطلاب: <b id="count">0</b></div>
                <div style="background: #eef2ff; padding: 20px; border-radius: 10px;">الحالة: <b>نشط</b></div>
            </div>
        </div>

        <div id="view-students" class="view">
            <h1>إدارة الطلاب</h1>
            <button class="btn">+ إضافة طالب</button>
            <br><br>
            <table border="1" width="100%" style="border-collapse: collapse;">
                <thead><tr><th>الاسم</th><th>المرحلة</th><th>الهاتف</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div id="view-settings" class="view">
            <h1>الإعدادات والبيانات</h1>
            <button class="btn" onclick="exportData()">⬇️ تصدير البيانات</button>
            <button class="btn" style="background:#6366f1" onclick="document.getElementById('import').click()">⬆️ استيراد البيانات</button>
            <input type="file" id="import" style="display:none" onchange="importData(this)">
        </div>
    </div>

    <script>
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        }

        // Database
        const DB_NAME = 'AcademiaProDB';
        let db;
        const req = indexedDB.open(DB_NAME, 2);
        
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('students')) db.createObjectStore('students', { keyPath: 'id' });
        };

        req.onsuccess = (e) => { 
            db = e.target.result;
            console.log("DB Ready");
            load().catch(err => console.error("Load failed:", err));
        };

        req.onerror = (e) => {
            alert("فشل فتح قاعدة البيانات: " + e.target.error);
        };

        async function load() {
            const t = db.transaction(['students'], 'readonly');
            const store = t.objectStore('students');
            const students = await new Promise(r => { store.getAll().onsuccess = (e) => r(e.target.result); });
            document.getElementById('count').textContent = students.length;
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = students.map(s => `<tr><td>${s.name}</td><td>${s.level}</td><td>${s.phone}</td></tr>`).join('');
        }

        function exportData() {
            const t = db.transaction(['students'], 'readonly');
            t.objectStore('students').getAll().onsuccess = (e) => {
                const data = JSON.stringify({students: e.target.result});
                const blob = new Blob([data], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'backup.json';
                a.click();
            };
        }

        function importData(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                const items = data.students || data.data.students || [];
                const t = db.transaction(['students'], 'readwrite');
                const store = t.objectStore('students');
                store.clear();
                items.forEach(i => store.put(i));
                alert('تم استرجاع البيانات! سيتم تحديث الصفحة');
                location.reload();
            };
            reader.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
