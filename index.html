<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام إدارة الطلاب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 2rem; }

        .input-group { text-align: right; margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.85rem; }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .success-message {
            color: #10b981;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .toggle-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
            cursor: pointer;
        }

        .toggle-link:hover {
            color: var(--primary);
        }

        #changePasswordForm {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">🔑</div>
        <h1>دخول النظام</h1>
        <p class="subtitle">يرجى إدخال كلمة المرور</p>

        <form id="loginForm">
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="••••" required autofocus>
            </div>
            <button type="submit">دخول</button>
            <div id="errorMessage" class="error-message">كلمة المرور غير صحيحة!</div>
            <a class="toggle-link" id="showChangePass">تغيير الرقم السري؟</a>
        </form>

        <form id="changePasswordForm">
            <div class="input-group">
                <label>الرقم السري الحالي</label>
                <input type="password" id="currentPass" placeholder="••••" required>
            </div>
            <div class="input-group">
                <label>الرقم السري الجديد</label>
                <input type="password" id="newPass" placeholder="••••" required>
            </div>
            <div class="input-group">
                <label>تأكيد الرقم الجديد</label>
                <input type="password" id="confirmPass" placeholder="••••" required>
            </div>
            <button type="submit">تحديث الرقم السري</button>
            <div id="changeErrorMessage" class="error-message"></div>
            <div id="changeSuccessMessage" class="success-message">تم تغيير الرقم السري بنجاح!</div>
            <a class="toggle-link" id="showLogin">العودة لتسجيل الدخول</a>
        </form>
    </div>

    <script>
        /**
         * AcademiaPro Database Manager (Embedded v2.5)
         */
        const DB_NAME = 'AcademiaProDB';
        const DB_VERSION = 2;

        class AcademiaDB {
            constructor() { this.db = null; }
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this.db);
                    };
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            }
            async get(s, i) { return new Promise((res, rej) => { 
                if(!this.db) return res(null);
                const t = this.db.transaction([s], 'readonly'); 
                const r = t.objectStore(s).get(i); 
                r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); 
            }); }
            async put(s, d) { return new Promise((res, rej) => {
                if(!this.db) return rej("DB not initialized");
                const t = this.db.transaction([s], 'readwrite');
                const r = t.objectStore(s).put(d);
                r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
            }); }
        }
        const db = new AcademiaDB();
    </script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'school_manager.html';
        }

        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        // Initializing DB
        let dbPromise = db.init();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            
            try {
                // Wait for DB with timeout
                await Promise.race([dbPromise, new Promise(res => setTimeout(res, 800))]);
                
                let actualPass = '1';
                try {
                    const config = await db.get('config', 'admin_password');
                    if (config) actualPass = config.value;
                } catch(e) { console.warn("DB not ready, using default"); }

                if (password === actualPass || (actualPass === '1' && (password === '1' || password === '123'))) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userRole', 'admin');
                    document.querySelector('.login-card').style.opacity = '0';
                    setTimeout(() => window.location.href = 'school_manager.html', 400);
                } else {
                    errorMessage.style.display = 'block';
                    passwordInput.value = '';
                    setTimeout(() => errorMessage.style.display = 'none', 3000);
                }
            } catch (err) {
                // Fallback for safety
                if (password === '1') {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'school_manager.html';
                }
            }
        });

        // Toggle logic
        const changePasswordForm = document.getElementById('changePasswordForm');
        const showChangePass = document.getElementById('showChangePass');
        const showLogin = document.getElementById('showLogin');
        const subtitle = document.querySelector('.subtitle');
        const title = document.querySelector('h1');

        showChangePass.onclick = () => {
            loginForm.style.display = 'none';
            changePasswordForm.style.display = 'block';
            title.textContent = 'تغيير الرقم السري';
            subtitle.textContent = 'يرجى إدخال البيانات المطلوبة';
        };

        showLogin.onclick = () => {
            changePasswordForm.style.display = 'none';
            loginForm.style.display = 'block';
            title.textContent = 'دخول النظام';
            subtitle.textContent = 'يرجى إدخال كلمة المرور';
        };

        // Change Password Logic
        changePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPass = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const changeError = document.getElementById('changeErrorMessage');
            const changeSuccess = document.getElementById('changeSuccessMessage');

            if (newPass !== confirmPass) {
                changeError.textContent = 'الأرقام الجديدة غير متطابقة!';
                changeError.style.display = 'block';
                setTimeout(() => changeError.style.display = 'none', 3000);
                return;
            }

            try {
                await dbPromise;
                let actualPass = '1';
                const config = await db.get('config', 'admin_password');
                if (config) actualPass = config.value;

                if (currentPass !== actualPass && !(actualPass === '1' && (currentPass === '1' || currentPass === '123'))) {
                    changeError.textContent = 'الرقم السري الحالي غير صحيح!';
                    changeError.style.display = 'block';
                    setTimeout(() => changeError.style.display = 'none', 3000);
                    return;
                }

                // Update DB
                await db.put('config', { key: 'admin_password', value: newPass });
                
                changeSuccess.style.display = 'block';
                setTimeout(() => {
                    changeSuccess.style.display = 'none';
                    showLogin.click(); // Back to login
                }, 2000);
                
                // Clear fields
                document.getElementById('currentPass').value = '';
                document.getElementById('newPass').value = '';
                document.getElementById('confirmPass').value = '';

            } catch (err) {
                console.error(err);
                changeError.textContent = 'حدث خطأ أثناء تحديث الرقم السري';
                changeError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
