<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام إدارة الطلاب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 2rem; }

        .input-group { text-align: right; margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.85rem; }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">🔑</div>
        <h1>دخول النظام</h1>
        <p class="subtitle">يرجى إدخال كلمة المرور</p>

        <form id="loginForm">
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="••••" required autofocus>
            </div>
            <button type="submit">دخول</button>
            <div id="errorMessage" class="error-message">كلمة المرور غير صحيحة!</div>
        </form>
    </div>

    <script src="db.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'school_manager.html';
        }

        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        // Initializing DB
        let dbPromise = db.init();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            
            try {
                // Wait for DB with timeout
                await Promise.race([dbPromise, new Promise(res => setTimeout(res, 800))]);
                
                let actualPass = '1';
                try {
                    const config = await db.get('config', 'admin_password');
                    if (config) actualPass = config.value;
                } catch(e) { console.warn("DB not ready, using default"); }

                if (password === actualPass || (actualPass === '1' && (password === '1' || password === '123'))) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userRole', 'admin');
                    document.querySelector('.login-card').style.opacity = '0';
                    setTimeout(() => window.location.href = 'school_manager.html', 400);
                } else {
                    errorMessage.style.display = 'block';
                    passwordInput.value = '';
                    setTimeout(() => errorMessage.style.display = 'none', 3000);
                }
            } catch (err) {
                // Fallback for safety
                if (password === '1') {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'school_manager.html';
                }
            }
        });
    </script>
</body>
</html>
